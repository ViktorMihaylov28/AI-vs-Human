<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host Panel - AI или Човек?</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="host-page">
  <div class="host-layout">
    <aside class="host-sidebar">
      <div class="host-brand">Host Panel</div>
      <div class="host-subtitle">AI или Човек? - Контролен панел</div>

      <div class="host-state-box">Статус: <span id="hostState">lobby</span></div>
      <div class="host-state-box">Играча: <span id="hostPlayersCount">0</span></div>
      <div class="host-state-box">Въпрос: <span id="hostQuestionInfo">0/0</span></div>
      <div class="host-state-box">Отговорили: <span id="hostAnswered">0</span></div>
      <div class="host-state-box">Неотговорили: <span id="hostUnanswered">0</span></div>

      <div class="host-buttons">
        <button id="startBtn" class="primary-btn">Старт на играта</button>
        <button id="nextBtn" class="secondary-btn">Next / Skip</button>
        <button id="resetBtn" class="danger-btn">Reset</button>
      </div>

      <div class="timer-panel">
        <div class="timer-label">Таймер</div>
        <div class="timer-big" id="hostTimer">15</div>
      </div>
    </aside>

    <main class="host-main">
      <section class="host-question-preview">
        <h2>Текущ въпрос</h2>

        <div class="host-images">
          <div class="image-card large-code-card">
            <div class="image-title" id="hostLeftCodeTitle">Ляв код</div>
            <div id="hostLeftCode" class="code-block"></div>
          </div>

          <div class="image-card large-code-card">
            <div class="image-title" id="hostRightCodeTitle">Десен код</div>
            <div id="hostRightCode" class="code-block"></div>
          </div>
        </div>

        <div class="correct-box">
          Правилен отговор: <span id="correctAnswerText">-</span>
        </div>
      </section>

      <section class="host-bottom-grid">
        <div class="panel-card">
          <h3>Играчите</h3>
          <div id="playersList"></div>
        </div>

        <div class="panel-card">
          <h3>Leaderboard</h3>
          <div id="leaderboardHost"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="/client.js"></script>
</body>
</html>
