# ===========================================
# Docker Compose for AI или Човек?
# ===========================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-human-quiz
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - USE_HTTPS=${USE_HTTPS:-false}
      - SSL_KEY_PATH=${SSL_KEY_PATH:-./key.pem}
      - SSL_CERT_PATH=${SSL_CERT_PATH:-./cert.pem}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_TO_FILE=true
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - SOCKET_RATE_LIMIT_MAX=${SOCKET_RATE_LIMIT_MAX:-50}
      - DB_FILE=/app/data/game_data.db
      - QUESTION_TIME_SECONDS=${QUESTION_TIME_SECONDS:-15}
      - QUESTIONS_PER_GAME=${QUESTIONS_PER_GAME:-20}
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - quiz-network

  # Optional: Nginx reverse proxy for SSL termination
  # nginx:
  #   image: nginx:alpine
  #   container_name: ai-human-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - quiz-network

networks:
  quiz-network:
    driver: bridge

volumes:
  app-data:
    driver: local
  app-logs:
    driver: local
